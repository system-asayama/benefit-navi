name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_PRODUCTION }}
          username: ${{ secrets.SSH_USER_PRODUCTION }}
          port: ${{ secrets.SSH_PORT_PRODUCTION }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PRODUCTION }}
          script: |
            APP_DIR="$HOME/apps/benefit-navi"
            REPO_URL="https://github.com/system-asayama/benefit-navi.git"

            if [ ! -d "$APP_DIR/.git" ] || ! git -C "$APP_DIR" remote get-url origin >/dev/null 2>&1; then
              rm -rf "$APP_DIR"
              mkdir -p "$HOME/apps"
              git clone "$REPO_URL" "$APP_DIR"
            else
              git -C "$APP_DIR" fetch origin
              git -C "$APP_DIR" reset --hard origin/main
            fi

            cd "$APP_DIR"
            docker compose pull 2>/dev/null || true
            docker compose up -d --build --remove-orphans

name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_PRODUCTION }}
          username: ${{ secrets.SSH_USER_PRODUCTION }}
          port: ${{ secrets.SSH_PORT_PRODUCTION }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PRODUCTION }}
          script: |
            [ -d ~/apps/benefit-navi/.git ] || (mkdir -p ~/apps/benefit-navi && cd ~/apps/benefit-navi && git init) && cd ~/apps/benefit-navi && git pull --rebase --autostash 2>/dev/null || git pull && cd ~/apps/benefit-navi && docker compose pull 2>/dev/null || true; docker compose up -d --build --remove-orphans && # ─── nginx vhost auto-config for benefit-navi.com ───
                    sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
                    sudo tee /etc/nginx/sites-available/benefit-navi.com.conf > /dev/null <<'NGINX_EOF'
            server {
                listen 80;
                listen [::]:80;
                server_name benefit-navi.com;
                location / {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            NGINX_EOF
                    sudo ln -sf /etc/nginx/sites-available/benefit-navi.com.conf /etc/nginx/sites-enabled/benefit-navi.com.conf
                    sudo nginx -t && sudo systemctl reload nginx && # ─── certbot SSL auto for benefit-navi.com ───
                    which certbot >/dev/null 2>&1 || sudo apt-get install -y certbot python3-certbot-nginx
                    sudo certbot --nginx --non-interactive --agree-tos -m system.asayama@gmail.com \
                        -d benefit-navi.com --redirect || true

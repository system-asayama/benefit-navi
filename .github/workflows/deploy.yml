name: Deploy

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_PRODUCTION }}
          username: ${{ secrets.SSH_USER_PRODUCTION }}
          port: ${{ secrets.SSH_PORT_PRODUCTION }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PRODUCTION }}
          script: |
            [ -d ~/apps/benefit-navi/.git ] || (mkdir -p ~/apps/benefit-navi && cd ~/apps/benefit-navi && git init) && cd ~/apps/benefit-navi && git pull --rebase --autostash 2>/dev/null || git pull && cd ~/apps/benefit-navi && WEB_PORT=8080 docker compose pull 2>/dev/null || true; WEB_PORT=8080 docker compose up -d --build --remove-orphans

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (dev)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_DEV }}
          username: ${{ secrets.SSH_USER_DEV }}
          port: ${{ secrets.SSH_PORT_DEV }}
          key: ${{ secrets.SSH_PRIVATE_KEY_DEV }}
          script: |
            [ -d ~/apps/dev/.git ] || (mkdir -p ~/apps/dev && cd ~/apps/dev && git init) && cd ~/apps/dev && git pull --rebase --autostash 2>/dev/null || git pull && cd ~/apps/dev && WEB_PORT=8081 docker compose pull 2>/dev/null || true; WEB_PORT=8081 docker compose up -d --build --remove-orphans

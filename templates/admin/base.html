<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}管理画面{% endblock %} | {{ site_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="admin-body">
  <header class="admin-header">
    <div class="container header-inner">
      <a class="brand" href="{{ url_for('admin.dashboard') }}">⚙️ {{ site_name }} 管理</a>
      <nav class="nav">
        <a href="{{ url_for('admin.dashboard') }}">記事</a>
        <a href="{{ url_for('admin.categories') }}">カテゴリ</a>
        <a href="{{ url_for('public.index') }}" target="_blank">サイトを見る ↗</a>
        <a href="{{ url_for('admin.logout') }}">ログアウト</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>

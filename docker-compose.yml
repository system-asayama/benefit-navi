services:
  mcp:
    build: .
    command: python mcp_server.py --http
    environment:
      BENEFIT_NAVI_API_URL: http://web:8000
      BENEFIT_NAVI_API_TOKEN: ${API_TOKEN:-}
      MCP_BEARER_TOKEN: ${API_TOKEN:-}
    ports:
      - "${MCP_PORT:-9100}:9100"
    depends_on:
      - web
    restart: unless-stopped
  web:
    build: .
    ports:
      - "${WEB_PORT:-8080}:8000"
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/benefit_navi
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      # MCP 連携用 REST API のトークン。空のままだと API は無効。
      API_TOKEN: ${API_TOKEN:-}
      # HTTPS 環境では true にしてセッション Cookie を HTTPS 限定にする。
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-}
      # ログイン総当たり対策（連続失敗回数 / ロック分数）。
      LOGIN_MAX_ATTEMPTS: ${LOGIN_MAX_ATTEMPTS:-5}
      LOGIN_LOCKOUT_MINUTES: ${LOGIN_LOCKOUT_MINUTES:-15}
    depends_on:
      - db
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: benefit_navi
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  db_data:
